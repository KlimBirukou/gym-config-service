name: gym

services:
  gym-config-server:
    container_name: gym-config-server
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8888:8888"
    networks:
      - gym-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  gym-network:
    external: true
