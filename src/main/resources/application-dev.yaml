spring:
  application:
    name: gym-config-server
  cloud:
    config:
      server:
        native:
          search-locations:
            - classpath:/config
            - classpath:/config/{application}

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: warn
    org.springframework.cloud.config.server: DEBUG
    org.springframework.cloud.native: DEBUG
    org.springframework.cloud.config.server.resource.GenericResourceRepository: DEBUG
